name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: trupitch
          POSTGRES_PASSWORD: trupitch
          POSTGRES_DB: trupitch
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trupitch"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      JWT_SECRET: ci-test-secret-please-change-this-32b
      DATABASE_URL: postgresql+asyncpg://trupitch:trupitch@localhost:5432/trupitch
      TEST_DATABASE_URL: postgresql+asyncpg://trupitch:trupitch@localhost:5432/trupitch_test

    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Verify migrations apply cleanly
        run: alembic upgrade head

      - name: Run tests
        run: pytest -q
