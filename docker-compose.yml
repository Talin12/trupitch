# Local development stack: all 5 services TruPitch needs. In practice,
# most development runs postgres+redis via this file and the api/
# worker/web processes directly on the host (see README.md's "Run"
# section) for faster reload — but `docker compose up --build` brings
# up everything, including api/worker/web, in containers too.
services:
  web:
    build:
      context: ./apps/web
      dockerfile: ../../infrastructure/Dockerfile.web
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app
      # Anonymous volume: keeps the container's own node_modules
      # (installed during build) instead of being shadowed by the host
      # bind mount above, which usually doesn't have node_modules at all.
      - /app/node_modules
    depends_on:
      - api

  api:
    build:
      context: ./apps/api
      dockerfile: ../../infrastructure/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      # Inside the compose network, Postgres/Redis are reachable by
      # service name (postgres/redis) on their default ports — this is
      # deliberately different from the host-side default in
      # core/config.py, which points at localhost:5433.
      DATABASE_URL: postgresql+asyncpg://trupitch:trupitch@postgres:5432/trupitch
      REDIS_URL: redis://redis:6379/0
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      # `:?` = fail the compose run immediately if JWT_SECRET isn't set
      # in the host's .env — matches core/config.py's Settings.jwt_secret
      # having no default, so a missing secret is never silently allowed.
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
    volumes:
      - ./apps/api:/app
    depends_on:
      # Wait for Postgres to actually accept connections (via its
      # healthcheck below), not just for the container to start — the
      # API would otherwise race Postgres's own startup.
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: ./apps/worker
      dockerfile: ../../infrastructure/Dockerfile.worker
    environment:
      DATABASE_URL: postgresql+asyncpg://trupitch:trupitch@postgres:5432/trupitch
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      - ./apps/worker:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trupitch
      POSTGRES_PASSWORD: trupitch
      POSTGRES_DB: trupitch
    ports:
      # 5433 on the host: many Macs run a native Postgres on 5432
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trupitch"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

# Named volumes persist database/cache contents across
# `docker compose down` (but not `docker compose down -v`), so local
# data survives a routine restart of the stack.
volumes:
  postgres_data:
  redis_data:
